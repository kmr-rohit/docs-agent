# Docs Agent Workflow Pipeline Code Change

## Action

Follow the pipeline-code-change workflow:
1. Identify the change needed across pipelines (e.g., dependency pinning, Docker image reference, Milvus logic).
2. Edit pipelines/incremental-pipeline.py, pipelines/issues-pipeline.py, pipelines/kubeflow-pipeline.py, and sometimes pipelines/code-pipeline.py to apply the change.
3. Update documentation if necessary.
4. Commit all affected pipeline files together with a descriptive message.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: pipelines/incremental-pipeline.py, pipelines/issues-pipeline.py, pipelines/kubeflow-pipeline.py

