# PIPELINE DEFINITION
# Name: github-rag
# Description: RAG pipeline for processing GitHub documentation
# Inputs:
#    base_url: str [Default: 'https://www.kubeflow.org/docs']
#    chunk_overlap: int [Default: 100.0]
#    chunk_size: int [Default: 1000.0]
#    collection_name: str [Default: 'kubeflow_docs_docs_rag']
#    directory_path: str [Default: 'content/en/docs']
#    embedding_batch_size: int [Default: 8.0]
#    embeddings_service_url: str [Default: 'http://embeddings-service-predictor.ml-infra.svc.cluster.local/embed']
#    github_token: str [Default: '']
#    milvus_host: str [Default: 'milvus-milvus.ml-infra.svc.cluster.local']
#    milvus_port: str [Default: '19530']
#    repo_name: str [Default: 'website']
#    repo_owner: str [Default: 'kubeflow']
components:
  comp-chunk-and-embed:
    executorLabel: exec-chunk-and-embed
    inputDefinitions:
      artifacts:
        github_data:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        base_url:
          parameterType: STRING
        chunk_overlap:
          parameterType: NUMBER_INTEGER
        chunk_size:
          parameterType: NUMBER_INTEGER
        embedding_batch_size:
          parameterType: NUMBER_INTEGER
        embeddings_service_url:
          parameterType: STRING
        repo_name:
          parameterType: STRING
    outputDefinitions:
      artifacts:
        embedded_data:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
  comp-download-github-directory:
    executorLabel: exec-download-github-directory
    inputDefinitions:
      parameters:
        directory_path:
          parameterType: STRING
        github_token:
          parameterType: STRING
        repo_name:
          parameterType: STRING
        repo_owner:
          parameterType: STRING
    outputDefinitions:
      artifacts:
        github_data:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
  comp-store-milvus:
    executorLabel: exec-store-milvus
    inputDefinitions:
      artifacts:
        embedded_data:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        collection_name:
          parameterType: STRING
        milvus_host:
          parameterType: STRING
        milvus_port:
          parameterType: STRING
deploymentSpec:
  executors:
    exec-chunk-and-embed:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - chunk_and_embed
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'requests' 'langchain-text-splitters'\
          \  &&  python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.1'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef chunk_and_embed(\n    github_data: dsl.Input[dsl.Dataset],\n\
          \    repo_name: str,\n    base_url: str,\n    chunk_size: int,\n    chunk_overlap:\
          \ int,\n    embeddings_service_url: str,\n    embedding_batch_size: int,\n\
          \    embedded_data: dsl.Output[dsl.Dataset],\n):\n    import json\n    import\
          \ os\n    import re\n    import requests\n    from langchain_text_splitters\
          \ import RecursiveCharacterTextSplitter\n\n    print(f\"Using embeddings\
          \ service: {embeddings_service_url}\")\n    embedding_batch_size = max(1,\
          \ int(embedding_batch_size))\n\n    records = []\n\n    with open(github_data.path,\
          \ 'r', encoding='utf-8') as f:\n        for line in f:\n            file_data\
          \ = json.loads(line)\n            content = file_data['content']\n\n   \
          \         # AGGRESSIVE CLEANING FOR BETTER EMBEDDINGS\n\n            # Remove\
          \ Hugo frontmatter (both --- and +++ styles)\n            content = re.sub(r'^\\\
          s*[+\\-]{3,}.*?[+\\-]{3,}\\s*', '', content, flags=re.DOTALL | re.MULTILINE)\n\
          \n            # Remove Hugo template syntax\n            content = re.sub(r'\\\
          {\\{.*?\\}\\}', '', content, flags=re.DOTALL)\n\n            # Remove HTML\
          \ comments and tags\n            content = re.sub(r'<!--.*?-->', '', content,\
          \ flags=re.DOTALL)\n            content = re.sub(r'<[^>]+>', ' ', content)\n\
          \n            # Remove navigation/menu artifacts\n            content =\
          \ re.sub(r'\\b(Get Started|Contribute|GenAI|Home|Menu|Navigation)\\b', '',\
          \ content, flags=re.IGNORECASE)\n\n            # Clean up URLs and links\n\
          \            content = re.sub(r'https?://[^\\s]+', '', content)\n      \
          \      content = re.sub(r'\\[([^\\]]+)\\]\\([^\\)]+\\)', r'\\1', content)\
          \  # Convert [text](url) to text\n\n            # Remove excessive whitespace\
          \ and normalize\n            content = re.sub(r'\\s+', ' ', content)  #\
          \ Multiple spaces to single\n            content = re.sub(r'\\n\\s*\\n\\\
          s*\\n+', '\\n\\n', content)  # Multiple newlines to double\n           \
          \ content = content.strip()\n\n            # Skip files that are too short\
          \ after cleaning\n            if len(content) < 50:\n                print(f\"\
          Skipping file after cleaning: {file_data['path']} ({len(content)} chars)\"\
          )\n                continue\n\n            # Build citation URL (same as\
          \ before)\n            path_parts = file_data['path'].split('/')\n     \
          \       if 'content/en/docs' in file_data['path']:\n                docs_index\
          \ = path_parts.index('docs')\n                url_path = '/'.join(path_parts[docs_index+1:])\n\
          \                url_path = os.path.splitext(url_path)[0]\n            \
          \    citation_url = f\"{base_url}/{url_path}\"\n            else:\n    \
          \            citation_url = f\"{base_url}/{file_data['path']}\"\n\n    \
          \        file_unique_id = f\"{repo_name}:{file_data['path']}\"\n\n     \
          \       # Create splitter\n            text_splitter = RecursiveCharacterTextSplitter(\n\
          \                chunk_size=chunk_size,\n                chunk_overlap=chunk_overlap,\n\
          \                length_function=len,\n                separators=[\"\\\
          n\\n\", \"\\n\", \". \", \" \", \"\"]\n            )\n\n            # Split\
          \ into chunks\n            chunks = text_splitter.split_text(content)\n\n\
          \            print(f\"File: {file_data['path']} -> {len(chunks)} chunks\"\
          )\n\n            for chunk_idx, chunk in enumerate(chunks):\n          \
          \      records.append({\n                    'file_unique_id': file_unique_id,\n\
          \                    'repo_name': repo_name,\n                    'file_path':\
          \ file_data['path'],\n                    'file_name': file_data['file_name'],\n\
          \                    'citation_url': citation_url[:1024],\n            \
          \        'chunk_index': chunk_idx,\n                    'content_text':\
          \ chunk[:2000],\n                })\n\n    print(f\"Created {len(records)}\
          \ chunks; requesting embeddings from TEI service...\")\n\n    for i in range(0,\
          \ len(records), embedding_batch_size):\n        batch = records[i:i + embedding_batch_size]\n\
          \        texts = [r[\"content_text\"] for r in batch]\n        response\
          \ = requests.post(\n            embeddings_service_url,\n            json={\"\
          inputs\": texts},\n            headers={\"Content-Type\": \"application/json\"\
          },\n            timeout=120,\n        )\n        response.raise_for_status()\n\
          \        vectors = response.json()\n        for idx, vector in enumerate(vectors):\n\
          \            batch[idx][\"embedding\"] = vector\n\n    print(f\"Embedded\
          \ {len(records)} chunks\")\n\n    with open(embedded_data.path, 'w', encoding='utf-8')\
          \ as f:\n        for record in records:\n            f.write(json.dumps(record,\
          \ ensure_ascii=False) + '\\n')\n\n"
        image: python:3.11-slim
    exec-download-github-directory:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - download_github_directory
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'requests' 'beautifulsoup4'\
          \  &&  python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.1'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef download_github_directory(\n    repo_owner: str,\n    repo_name:\
          \ str,\n    directory_path: str,\n    github_token: str,\n    github_data:\
          \ dsl.Output[dsl.Dataset]\n):\n    import os\n    import requests\n    import\
          \ json\n    import base64\n    import time\n    from bs4 import BeautifulSoup\n\
          \n    def resolve_github_token(token):\n        for candidate in (token,\
          \ os.environ.get(\"Github_Pat\"), os.environ.get(\"GITHUB_TOKEN\")):\n \
          \           if candidate and str(candidate).strip():\n                return\
          \ str(candidate).strip()\n        return \"\"\n\n    github_token = resolve_github_token(github_token)\n\
          \    if github_token:\n        print(\"Using authenticated GitHub API requests\"\
          )\n    else:\n        print(\"WARNING: No github_token or Github_Pat env\
          \ set; rate limits will be low (60 req/hr)\")\n\n    headers = {\"Authorization\"\
          : f\"token {github_token}\"} if github_token else {}\n\n    def api_request(url,\
          \ params=None):\n        max_retries = 3\n        for attempt in range(max_retries):\n\
          \            try:\n                resp = requests.get(url, params=params,\
          \ headers=headers)\n\n                if resp.status_code == 403:\n    \
          \                remaining = resp.headers.get(\"X-RateLimit-Remaining\"\
          , \"0\")\n                    if remaining == \"0\":\n                 \
          \       reset_time = int(resp.headers.get(\"X-RateLimit-Reset\", 0))\n \
          \                       wait_time = max(reset_time - int(time.time()), 60)\n\
          \                        print(f\"Rate limited. Waiting {wait_time}s...\"\
          )\n                        time.sleep(min(wait_time, 300))\n           \
          \             continue\n                    print(f\"Forbidden (403) for\
          \ {url}: {resp.text[:200]}\")\n\n                if resp.status_code ==\
          \ 200:\n                    return resp.json()\n\n                print(f\"\
          API error: HTTP {resp.status_code} for {url}\")\n                return\
          \ None\n\n            except Exception as e:\n                print(f\"\
          Request failed (attempt {attempt + 1}): {e}\")\n                time.sleep(2\
          \ ** attempt)\n\n        return None\n\n    def get_files_recursive(url):\n\
          \        files = []\n        items = api_request(url)\n        if not items\
          \ or not isinstance(items, list):\n            return files\n\n        for\
          \ item in items:\n            if item['type'] == 'file' and (item['name'].endswith('.md')\
          \ or item['name'].endswith('.html')):\n                file_data = api_request(item['url'])\n\
          \                if not file_data or 'content' not in file_data:\n     \
          \               print(f\"Skipping unreadable file: {item['path']}\")\n \
          \                   continue\n                content = base64.b64decode(file_data['content']).decode('utf-8')\n\
          \n                if item['name'].endswith('.html'):\n                 \
          \   soup = BeautifulSoup(content, 'html.parser')\n                    content\
          \ = soup.get_text(separator=' ', strip=True)\n\n                files.append({\n\
          \                    'path': item['path'],\n                    'content':\
          \ content,\n                    'file_name': item['name']\n            \
          \    })\n            elif item['type'] == 'dir':\n                files.extend(get_files_recursive(item['url']))\n\
          \n        return files\n\n    api_url = f\"https://api.github.com/repos/{repo_owner}/{repo_name}/contents/{directory_path}\"\
          \n    files = get_files_recursive(api_url)\n    print(f\"Downloaded {len(files)}\
          \ files\")\n\n    with open(github_data.path, 'w', encoding='utf-8') as\
          \ f:\n        for file_data in files:\n            f.write(json.dumps(file_data,\
          \ ensure_ascii=False) + '\\n')\n\n"
        image: docker.io/library/python:3.9
    exec-store-milvus:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - store_milvus
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'pymilvus' 'numpy'\
          \  &&  python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.1'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef store_milvus(\n    embedded_data: dsl.Input[dsl.Dataset],\n \
          \   milvus_host: str,\n    milvus_port: str,\n    collection_name: str\n\
          ):\n    from pymilvus import connections, utility, FieldSchema, CollectionSchema,\
          \ DataType, Collection\n    import json\n    import os\n    from datetime\
          \ import datetime\n\n    SCHEMA_VERSION = 1\n    SCHEMA_DESCRIPTION = f\"\
          RAG collection for documentation (v={SCHEMA_VERSION})\"\n    DELETE_BATCH_SIZE\
          \ = 100\n\n    milvus_user = os.environ.get(\"MILVUS_USER\", \"root\")\n\
          \    milvus_password = os.environ.get(\"MILVUS_PASSWORD\", \"\")\n    if\
          \ not milvus_password:\n        raise RuntimeError(\"MILVUS_PASSWORD must\
          \ be set via pipeline secret (not in source code)\")\n\n    connections.connect(\n\
          \        \"default\",\n        host=milvus_host,\n        port=milvus_port,\n\
          \        user=milvus_user,\n        password=milvus_password,\n    )\n\n\
          \    fields = [\n        FieldSchema(name=\"id\", dtype=DataType.INT64,\
          \ is_primary=True, auto_id=True),\n        FieldSchema(name=\"file_unique_id\"\
          , dtype=DataType.VARCHAR, max_length=512),\n        FieldSchema(name=\"\
          repo_name\", dtype=DataType.VARCHAR, max_length=256),\n        FieldSchema(name=\"\
          file_path\", dtype=DataType.VARCHAR, max_length=512),\n        FieldSchema(name=\"\
          file_name\", dtype=DataType.VARCHAR, max_length=256),\n        FieldSchema(name=\"\
          citation_url\", dtype=DataType.VARCHAR, max_length=1024),\n        FieldSchema(name=\"\
          chunk_index\", dtype=DataType.INT64),\n        FieldSchema(name=\"content_text\"\
          , dtype=DataType.VARCHAR, max_length=2000),\n        FieldSchema(name=\"\
          vector\", dtype=DataType.FLOAT_VECTOR, dim=768),\n        FieldSchema(name=\"\
          last_updated\", dtype=DataType.INT64)\n    ]\n\n    schema = CollectionSchema(fields,\
          \ SCHEMA_DESCRIPTION)\n\n    collection_existed = utility.has_collection(collection_name)\n\
          \    if collection_existed:\n        collection = Collection(collection_name)\n\
          \        existing_desc = collection.description or \"\"\n        if f\"\
          v={SCHEMA_VERSION}\" not in existing_desc:\n            raise RuntimeError(\n\
          \                f\"Schema version mismatch for {collection_name}. \"\n\
          \                f\"Expected v={SCHEMA_VERSION}, found description: '{existing_desc}'.\
          \ \"\n                f\"Run a migration job to drop+recreate before re-indexing.\"\
          \n            )\n        print(f\"Using existing collection: {collection_name}\
          \ (schema v={SCHEMA_VERSION})\")\n    else:\n        collection = Collection(collection_name,\
          \ schema)\n        print(f\"Created new collection: {collection_name} (schema\
          \ v={SCHEMA_VERSION})\")\n\n    # Rest of your existing code remains the\
          \ same...\n    records = []\n    timestamp = int(datetime.now().timestamp())\n\
          \n    with open(embedded_data.path, 'r', encoding='utf-8') as f:\n     \
          \   for line in f:\n            record = json.loads(line)\n            records.append({\n\
          \                \"file_unique_id\": record[\"file_unique_id\"],\n     \
          \           \"repo_name\": record[\"repo_name\"],\n                \"file_path\"\
          : record[\"file_path\"],\n                \"file_name\": record[\"file_name\"\
          ],\n                \"citation_url\": record[\"citation_url\"],\n      \
          \          \"chunk_index\": record[\"chunk_index\"],\n                \"\
          content_text\": record[\"content_text\"],\n                \"vector\": record[\"\
          embedding\"],\n                \"last_updated\": timestamp\n           \
          \ })\n\n    if records:\n        # load() before delete requires an existing\
          \ index; new collections have none yet\n        if collection_existed and\
          \ len(collection.indexes) > 0:\n            collection.load()\n        \
          \    unique_ids = sorted(set(r[\"file_unique_id\"] for r in records))\n\
          \            deleted = 0\n            try:\n                for i in range(0,\
          \ len(unique_ids), DELETE_BATCH_SIZE):\n                    batch_ids =\
          \ unique_ids[i:i + DELETE_BATCH_SIZE]\n                    quoted = \",\
          \ \".join(f'\"{uid}\"' for uid in batch_ids)\n                    expr =\
          \ f\"file_unique_id in [{quoted}]\"\n                    old = collection.query(expr=expr,\
          \ output_fields=[\"id\"], limit=16384)\n                    if old:\n  \
          \                      collection.delete(expr)\n                       \
          \ deleted += len(old)\n                if deleted:\n                   \
          \ collection.flush()\n                    print(f\"Deleted {deleted} old\
          \ chunks for {len(unique_ids)} files\")\n            except Exception as\
          \ e:\n                print(f\"ERROR during delete phase: {e}\")\n     \
          \           print(f\"Failed batch unique_ids: {unique_ids[i:i + DELETE_BATCH_SIZE]}\"\
          )\n                raise\n\n        # Insert new chunks (failure-aware)\n\
          \        batch_size = 1000\n        inserted = 0\n        try:\n       \
          \     for i in range(0, len(records), batch_size):\n                batch\
          \ = records[i:i + batch_size]\n                collection.insert(batch)\n\
          \                inserted += len(batch)\n            collection.flush()\n\
          \        except Exception as e:\n            print(f\"ERROR during insert.\
          \ Inserted={inserted}/{len(records)}. Error: {e}\")\n            failed_ids\
          \ = sorted(set(r[\"file_unique_id\"] for r in records[i:i + batch_size]))\n\
          \            print(f\"Failed batch starts at record {i}, file_unique_ids\
          \ in failing batch: {failed_ids}\")\n            raise\n\n        # Create\
          \ index if not already present\n        if not collection.has_index():\n\
          \            index_params = {\n                \"metric_type\": \"COSINE\"\
          ,\n                \"index_type\": \"IVF_FLAT\",\n                \"params\"\
          : {\"nlist\": min(1024, len(records))}\n            }\n            collection.create_index(\"\
          vector\", index_params)\n        collection.load()\n        print(f\"Inserted\
          \ {len(records)} records. Total: {collection.num_entities}\")\n\n"
        image: docker.io/library/python:3.9
pipelineInfo:
  description: RAG pipeline for processing GitHub documentation
  name: github-rag
root:
  dag:
    tasks:
      chunk-and-embed:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-chunk-and-embed
        dependentTasks:
        - download-github-directory
        inputs:
          artifacts:
            github_data:
              taskOutputArtifact:
                outputArtifactKey: github_data
                producerTask: download-github-directory
          parameters:
            base_url:
              componentInputParameter: base_url
            chunk_overlap:
              componentInputParameter: chunk_overlap
            chunk_size:
              componentInputParameter: chunk_size
            embedding_batch_size:
              componentInputParameter: embedding_batch_size
            embeddings_service_url:
              componentInputParameter: embeddings_service_url
            repo_name:
              componentInputParameter: repo_name
        taskInfo:
          name: chunk-and-embed
      download-github-directory:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-download-github-directory
        inputs:
          parameters:
            directory_path:
              componentInputParameter: directory_path
            github_token:
              componentInputParameter: github_token
            repo_name:
              componentInputParameter: repo_name
            repo_owner:
              componentInputParameter: repo_owner
        taskInfo:
          name: download-github-directory
      store-milvus:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-store-milvus
        dependentTasks:
        - chunk-and-embed
        inputs:
          artifacts:
            embedded_data:
              taskOutputArtifact:
                outputArtifactKey: embedded_data
                producerTask: chunk-and-embed
          parameters:
            collection_name:
              componentInputParameter: collection_name
            milvus_host:
              componentInputParameter: milvus_host
            milvus_port:
              componentInputParameter: milvus_port
        taskInfo:
          name: store-milvus
  inputDefinitions:
    parameters:
      base_url:
        defaultValue: https://www.kubeflow.org/docs
        isOptional: true
        parameterType: STRING
      chunk_overlap:
        defaultValue: 100.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      chunk_size:
        defaultValue: 1000.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      collection_name:
        defaultValue: kubeflow_docs_docs_rag
        isOptional: true
        parameterType: STRING
      directory_path:
        defaultValue: content/en/docs
        isOptional: true
        parameterType: STRING
      embedding_batch_size:
        defaultValue: 8.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      embeddings_service_url:
        defaultValue: http://embeddings-service-predictor.ml-infra.svc.cluster.local/embed
        isOptional: true
        parameterType: STRING
      github_token:
        defaultValue: ''
        isOptional: true
        parameterType: STRING
      milvus_host:
        defaultValue: milvus-milvus.ml-infra.svc.cluster.local
        isOptional: true
        parameterType: STRING
      milvus_port:
        defaultValue: '19530'
        isOptional: true
        parameterType: STRING
      repo_name:
        defaultValue: website
        isOptional: true
        parameterType: STRING
      repo_owner:
        defaultValue: kubeflow
        isOptional: true
        parameterType: STRING
schemaVersion: 2.1.0
sdkVersion: kfp-2.16.1
---
platforms:
  kubernetes:
    deploymentSpec:
      executors:
        exec-download-github-directory:
          secretAsEnv:
          - keyToEnv:
            - envVar: Github_Pat
              secretKey: Github_Pat
            optional: false
            secretName: github-pat
            secretNameParameter:
              runtimeValue:
                constant: github-pat
        exec-store-milvus:
          secretAsEnv:
          - keyToEnv:
            - envVar: MILVUS_USER
