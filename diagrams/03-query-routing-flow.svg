<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <filter id="sh"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/></filter>
    <marker id="ar" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#64748B"/></marker>
    <marker id="arB" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#3B82F6"/></marker>
    <marker id="arA" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#F59E0B"/></marker>
    <marker id="arG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#10B981"/></marker>
    <marker id="arR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#EF4444"/></marker>
    <marker id="arP" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#8B5CF6"/></marker>
  </defs>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#1E293B">Query Routing Flow — Kagent ReAct Loop</text>
  <text x="450" y="46" text-anchor="middle" font-size="11" fill="#94A3B8">LLM-based routing via systemMessage · No custom classifier needed</text>

  <!-- Step 1: User Query -->
  <rect x="30" y="70" width="140" height="55" rx="27" fill="#3B82F6" filter="url(#sh)"/>
  <text x="100" y="92" text-anchor="middle" font-size="11" font-weight="600" fill="white">User Query</text>
  <text x="100" y="107" text-anchor="middle" font-size="9" fill="#BFDBFE">"KServe pod keeps crashing"</text>

  <!-- Arrow 1 -->
  <line x1="170" y1="97" x2="210" y2="97" stroke="#64748B" stroke-width="2" marker-end="url(#ar)"/>

  <!-- Step 2: Kagent Agent -->
  <rect x="215" y="65" width="180" height="65" rx="12" fill="#7C3AED" filter="url(#sh)"/>
  <text x="305" y="88" text-anchor="middle" font-size="12" font-weight="700" fill="white">Kagent Agent</text>
  <text x="305" y="104" text-anchor="middle" font-size="9" fill="#DDD6FE">LLM reads systemMessage</text>
  <text x="305" y="118" text-anchor="middle" font-size="9" fill="#DDD6FE">Decides: tool_call or direct reply</text>

  <!-- Arrow 2 -->
  <line x1="395" y1="97" x2="435" y2="97" stroke="#64748B" stroke-width="2" marker-end="url(#ar)"/>

  <!-- Decision Diamond -->
  <polygon points="525,50 615,97 525,145 435,97" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5" filter="url(#sh)"/>
  <text x="525" y="92" text-anchor="middle" font-size="11" font-weight="700" fill="#92400E">Intent</text>
  <text x="525" y="106" text-anchor="middle" font-size="9" fill="#92400E">Classification</text>

  <!-- Branch: Docs -->
  <line x1="525" y1="50" x2="525" y2="20" stroke="#3B82F6" stroke-width="2"/>
  <line x1="525" y1="20" x2="750" y2="20" stroke="#3B82F6" stroke-width="2" marker-end="url(#arB)"/>
  <text x="637" y="14" text-anchor="middle" font-size="9" font-weight="600" fill="#3B82F6">setup, concepts, API</text>

  <!-- Branch: Issues -->
  <line x1="615" y1="97" x2="755" y2="97" stroke="#F59E0B" stroke-width="2" marker-end="url(#arA)"/>
  <text x="685" y="90" text-anchor="middle" font-size="9" font-weight="600" fill="#D97706">errors, bugs, workarounds</text>

  <!-- Branch: Code -->
  <line x1="525" y1="145" x2="525" y2="175" stroke="#10B981" stroke-width="2"/>
  <line x1="525" y1="175" x2="750" y2="175" stroke="#10B981" stroke-width="2" marker-end="url(#arG)"/>
  <text x="637" y="169" text-anchor="middle" font-size="9" font-weight="600" fill="#059669">manifests, YAML, deployment</text>

  <!-- Branch: No tool -->
  <line x1="435" y1="97" x2="435" y2="97" stroke="none"/>
  <path d="M525,145 L525,220 L100,220" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#arR)"/>
  <text x="310" y="215" text-anchor="middle" font-size="9" fill="#EF4444">greetings, off-topic → direct reply (no tool)</text>

  <!-- Tool boxes on right -->
  <rect x="755" y="5" width="120" height="35" rx="8" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="815" y="27" text-anchor="middle" font-size="10" font-weight="600" fill="#1D4ED8">search_docs()</text>

  <rect x="755" y="82" width="120" height="35" rx="8" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="815" y="104" text-anchor="middle" font-size="10" font-weight="600" fill="#D97706">search_issues()</text>

  <rect x="755" y="160" width="120" height="35" rx="8" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5"/>
  <text x="815" y="182" text-anchor="middle" font-size="10" font-weight="600" fill="#059669">search_code()</text>

  <!-- ====== Bottom: Detailed MCP execution flow ====== -->
  <line x1="30" y1="265" x2="870" y2="265" stroke="#E2E8F0" stroke-width="1"/>
  <text x="30" y="290" font-size="13" font-weight="700" fill="#64748B">MCP TOOL EXECUTION (inside _search_collection)</text>

  <!-- Step boxes -->
  <rect x="30" y="310" width="130" height="70" rx="10" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5" filter="url(#sh)"/>
  <text x="95" y="335" text-anchor="middle" font-size="10" font-weight="700" fill="#334155">1. Encode Query</text>
  <text x="95" y="352" text-anchor="middle" font-size="9" fill="#64748B">model.encode(query)</text>
  <text x="95" y="365" text-anchor="middle" font-size="9" fill="#64748B">.tolist() → 768-dim</text>

  <line x1="160" y1="345" x2="190" y2="345" stroke="#64748B" stroke-width="1.5" marker-end="url(#ar)"/>

  <rect x="195" y="310" width="130" height="70" rx="10" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5" filter="url(#sh)"/>
  <text x="260" y="335" text-anchor="middle" font-size="10" font-weight="700" fill="#334155">2. Build Filter</text>
  <text x="260" y="352" text-anchor="middle" font-size="9" fill="#64748B">repo_name == "..."</text>
  <text x="260" y="365" text-anchor="middle" font-size="9" fill="#64748B">issue_state == "open"</text>

  <line x1="325" y1="345" x2="355" y2="345" stroke="#64748B" stroke-width="1.5" marker-end="url(#ar)"/>

  <rect x="360" y="310" width="130" height="70" rx="10" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5" filter="url(#sh)"/>
  <text x="425" y="335" text-anchor="middle" font-size="10" font-weight="700" fill="#334155">3. Milvus Search</text>
  <text x="425" y="352" text-anchor="middle" font-size="9" fill="#64748B">client.search(</text>
  <text x="425" y="365" text-anchor="middle" font-size="9" fill="#64748B">  data, limit, filter)</text>

  <line x1="490" y1="345" x2="520" y2="345" stroke="#64748B" stroke-width="1.5" marker-end="url(#ar)"/>

  <rect x="525" y="310" width="130" height="70" rx="10" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5" filter="url(#sh)"/>
  <text x="590" y="335" text-anchor="middle" font-size="10" font-weight="700" fill="#334155">4. Format Results</text>
  <text x="590" y="352" text-anchor="middle" font-size="9" fill="#64748B">score + source URL</text>
  <text x="590" y="365" text-anchor="middle" font-size="9" fill="#64748B">+ metadata + snippet</text>

  <line x1="655" y1="345" x2="685" y2="345" stroke="#64748B" stroke-width="1.5" marker-end="url(#ar)"/>

  <rect x="690" y="310" width="130" height="70" rx="10" fill="#F0FDF4" stroke="#10B981" stroke-width="1.5" filter="url(#sh)"/>
  <text x="755" y="335" text-anchor="middle" font-size="10" font-weight="700" fill="#059669">5. Return to LLM</text>
  <text x="755" y="352" text-anchor="middle" font-size="9" fill="#064E3B">~150 tokens</text>
  <text x="755" y="365" text-anchor="middle" font-size="9" fill="#064E3B">+ validation link</text>

  <!-- Thin context callout -->
  <rect x="500" y="410" width="370" height="55" rx="10" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="685" y="432" text-anchor="middle" font-size="11" font-weight="700" fill="#6D28D9">Thin Context Design (per KEP)</text>
  <text x="685" y="448" text-anchor="middle" font-size="10" fill="#7C3AED">Golden Snippet (~150 tokens) + Validation Link (GitHub/docs URL)</text>
  <text x="685" y="462" text-anchor="middle" font-size="9" fill="#94A3B8">Precision retrieval service, NOT a chatbot. LLM synthesizes, does not parrot.</text>

  <!-- ReAct loop indicator -->
  <rect x="30" y="410" width="250" height="90" rx="10" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1"/>
  <text x="155" y="432" text-anchor="middle" font-size="11" font-weight="700" fill="#DC2626">ReAct Loop (Kagent/ADK)</text>
  <text x="155" y="450" text-anchor="middle" font-size="9" fill="#7F1D1D">1. LLM call → tool_call or text response</text>
  <text x="155" y="464" text-anchor="middle" font-size="9" fill="#7F1D1D">2. MCP executes tool → result appended</text>
  <text x="155" y="478" text-anchor="middle" font-size="9" fill="#7F1D1D">3. LLM synthesizes final answer</text>
  <text x="155" y="492" text-anchor="middle" font-size="9" fill="#7F1D1D">4. Streamed via SSE to client</text>
</svg>