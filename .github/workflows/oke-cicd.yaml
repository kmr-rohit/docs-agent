name: Build, Test, and Deploy to OKE

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      deploy_kserve:
        description: Deploy/update KServe Qwen (single GPU — recycles revision)
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: mcp-kubeflow-docs
  K8S_NAMESPACE: docs-agent
  OKE_CLUSTER_OCID: ${{ secrets.OKE_CLUSTER_OCID }}

jobs:
  test-and-compile:
    name: Compile and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r docs-agent-mcp/mcp-server/requirements.txt
          pip install -r requirements-test.txt
          pip install ruff kfp kfp-kubernetes

      - name: Compile docs RAG pipeline
        working-directory: docs-agent-mcp/pipelines
        run: |
          python kubeflow-pipeline.py
          python issues-pipeline.py
          python code-pipeline.py

      - name: Ruff lint
        run: ruff check docs-agent-mcp/mcp-server tests docs-agent-mcp/pipelines

      - name: Compile MCP server
        run: python -m py_compile docs-agent-mcp/mcp-server/*.py

      - name: Run Unit Tests
        run: pytest -v --tb=short

  build-and-deploy:
    name: Build, Push, and Deploy to OKE
    needs: test-and-compile
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    # Secrets are stored under Settings → Environments → kubeflow (not repo secrets)
    environment: kubeflow
    permissions:
      contents: read
      packages: write
    env:
      # oracle-actions/configure-kubectl-oke expects OCI_CLI_* env vars
      OCI_CLI_USER: ${{ secrets.OCI_USER_OCID }}
      OCI_CLI_TENANCY: ${{ secrets.OCI_TENANCY_OCID }}
      OCI_CLI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
      OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_KEY_FILE }}
      OCI_CLI_REGION: ${{ secrets.OCI_REGION }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Validate deploy secrets
        env:
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_TOKEN || secrets.GHCR_PULL_TOKEN || secrets.Github_Pat }}
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_KEY_FILE: ${{ secrets.OCI_KEY_FILE }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OKE_CLUSTER_OCID: ${{ secrets.OKE_CLUSTER_OCID }}
        run: |
          set -euo pipefail
          missing=()
          for name in OCI_USER_OCID OCI_TENANCY_OCID OCI_FINGERPRINT OCI_KEY_FILE OCI_REGION OKE_CLUSTER_OCID; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done
          if [ -z "${GHCR_PULL_TOKEN:-}" ]; then
            missing+=("GHCR_TOKEN or GHCR_PULL_TOKEN or Github_Pat (needs read:packages for cluster image pull)")
          fi
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing required GitHub Actions secrets in environment 'kubeflow':"
            printf '  - %s\n' "${missing[@]}"
            echo "Add them under Settings → Environments → kubeflow → Environment secrets."
            exit 1
          fi

      - name: Set image coordinates
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
        run: |
          owner_lc="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          ghcr_user="${GHCR_USERNAME:-$owner_lc}"
          echo "IMAGE_REPO=ghcr.io/${owner_lc}/${{ env.IMAGE_NAME }}" >> "$GITHUB_ENV"
          echo "GHCR_USERNAME=${ghcr_user}" >> "$GITHUB_ENV"
          echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push MCP Image
        uses: docker/build-push-action@v5
        with:
          context: ./docs-agent-mcp/mcp-server
          file: ./docs-agent-mcp/mcp-server/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_REPO }}:${{ env.tag }}
            ${{ env.IMAGE_REPO }}:latest

      - name: Configure kubectl for OKE
        uses: oracle-actions/configure-kubectl-oke@v1.5.0
        with:
          cluster: ${{ secrets.OKE_CLUSTER_OCID }}

      - name: Deploy to OKE
        env:
          FULL_IMAGE: ${{ env.IMAGE_REPO }}:${{ env.tag }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_TOKEN || secrets.GHCR_PULL_TOKEN || secrets.Github_Pat }}
          GHCR_USERNAME: ${{ env.GHCR_USERNAME }}
        run: |
          set -euo pipefail

          kubectl create namespace "${{ env.K8S_NAMESPACE }}" --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret docker-registry ghcrsecret \
            --namespace "${{ env.K8S_NAMESPACE }}" \
            --docker-server="${{ env.REGISTRY }}" \
            --docker-username="${GHCR_USERNAME}" \
            --docker-password="${GHCR_PULL_TOKEN}" \
            --docker-email="${GHCR_USERNAME}@users.noreply.github.com" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl apply -f docs-agent-mcp/manifests/mcp-server/mcp-server.yaml
          kubectl set image deployment/mcp-kubeflow-docs \
            mcp-server="${FULL_IMAGE}" \
            -n "${{ env.K8S_NAMESPACE }}" || true
          kubectl patch deployment/mcp-kubeflow-docs -n "${{ env.K8S_NAMESPACE }}" --type=merge \
            -p '{"spec":{"template":{"spec":{"imagePullSecrets":[{"name":"ghcrsecret"}]}}}}'
          kubectl rollout status deployment/mcp-kubeflow-docs \
            -n "${{ env.K8S_NAMESPACE }}" --timeout=600s

          kubectl apply -f legacy/manifests/qwen-llm-service.yaml
          kubectl apply -f docs-agent-mcp/manifests/kagent/setup.yaml

          DEPLOY_KSERVE=false
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.deploy_kserve }}" = "true" ]; then
            DEPLOY_KSERVE=true
          elif [ "${{ github.event_name }}" = "push" ]; then
            # Only content edits (M), not renames/moves (R) or new paths (A) — avoids
            # accidental GPU recycle when manifests are relocated (e.g. manifests/ → legacy/manifests/).
            if git diff --name-only --diff-filter=M "${{ github.event.before }}" "${{ github.sha }}" \
              | grep -qE '^(legacy/manifests|manifests)/(inference-service|serving-runtime)\.yaml$'; then
              DEPLOY_KSERVE=true
            fi
          fi

          if [ "${DEPLOY_KSERVE}" = "true" ]; then
            echo "KServe manifest change or manual flag — deploying GPU inference"
            chmod +x scripts/deploy-kserve-if-changed.sh
            FORCE_KSERVE_DEPLOY=true scripts/deploy-kserve-if-changed.sh
          else
            echo "Skipping KServe GPU deploy (no manifest change)"
            chmod +x scripts/deploy-kserve-if-changed.sh
            FORCE_KSERVE_DEPLOY=false scripts/deploy-kserve-if-changed.sh
          fi

      - name: Smoke test MCP
        run: |
          set -euo pipefail
          kubectl rollout status deployment/mcp-kubeflow-docs \
            -n "${{ env.K8S_NAMESPACE }}" --timeout=120s
          kubectl exec -n "${{ env.K8S_NAMESPACE }}" deploy/mcp-kubeflow-docs -- python3 -c "
          import urllib.request
          urllib.request.urlopen('http://127.0.0.1:8000/mcp', timeout=5)
          print('mcp server listening')
          "
          kubectl get agent,modelconfig -n "${{ env.K8S_NAMESPACE }}"

      - name: Smoke test Qwen (non-blocking)
        continue-on-error: true
        run: |
          set -euo pipefail
          POD="$(kubectl get pods -n "${{ env.K8S_NAMESPACE }}" -l serving.kserve.io/inferenceservice=qwen \
            --field-selector=status.phase=Running \
            -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)"
          if [ -z "${POD}" ]; then
            echo "No running qwen pod — skipping LLM smoke test"
            exit 0
          fi
          kubectl exec -n "${{ env.K8S_NAMESPACE }}" "${POD}" -c kserve-container -- python3 -c "
          import urllib.request, json
          p=json.dumps({'model':'qwen2.5-3b-instruct','messages':[{'role':'user','content':'ping'}],'max_tokens':8}).encode()
          r=urllib.request.urlopen(urllib.request.Request('http://127.0.0.1:8080/openai/v1/chat/completions',data=p,headers={'Content-Type':'application/json'}), timeout=60)
          print('kserve ok', r.status)
          "
