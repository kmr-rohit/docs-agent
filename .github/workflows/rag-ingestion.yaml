name: RAG Ingestion Pipelines

on:
  workflow_dispatch:
    inputs:
      pipelines:
        description: "Comma-separated: docs, issues, code (default: all three)"
        required: false
        default: "docs,issues,code"
      max_issues_per_repo:
        description: "Max issues per repo for issues pipeline"
        required: false
        default: "100"

jobs:
  ingest:
    name: Run RAG pipelines on OKE
    runs-on: ubuntu-latest
    environment: kubeflow
    env:
      OCI_CLI_USER: ${{ secrets.OCI_USER_OCID }}
      OCI_CLI_TENANCY: ${{ secrets.OCI_TENANCY_OCID }}
      OCI_CLI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
      OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_KEY_FILE }}
      OCI_CLI_REGION: ${{ secrets.OCI_REGION }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install KFP client
        run: |
          pip install kfp kfp-kubernetes
          pip install -r pipelines/requirements.txt

      - name: Configure kubectl for OKE
        uses: oracle-actions/configure-kubectl-oke@v1.5.0
        with:
          cluster: ${{ secrets.OKE_CLUSTER_OCID }}

      - name: Submit RAG pipelines
        env:
          GITHUB_PAT: ${{ secrets.Github_Pat || secrets.GHCR_TOKEN }}
        run: |
          set -euo pipefail
          chmod +x scripts/submit-rag-pipelines.sh
          IFS=',' read -ra SELECTED <<< "${{ inputs.pipelines }}"
          export KFP_NAMESPACE=user
          ./scripts/submit-rag-pipelines.sh "${SELECTED[@]}"

      - name: Verify Milvus collections
        run: |
          kubectl exec -n docs-agent deploy/mcp-kubeflow-docs -- python3 -c "
          from pymilvus import connections, utility, Collection
          connections.connect('default', host='my-release-milvus.docs-agent.svc.cluster.local', port='19530')
          for name in utility.list_collections():
              col = Collection(name)
              col.load()
              print(name, col.num_entities)
          "
