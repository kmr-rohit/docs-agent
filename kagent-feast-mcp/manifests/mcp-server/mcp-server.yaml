apiVersion: v1
kind: ConfigMap
metadata:
  name: mcp-server-config
  namespace: docs-agent
data:
  COLLECTION_NAME: kubeflow_docs_docs_rag
  EMBEDDING_MODEL: sentence-transformers/all-mpnet-base-v2
  MILVUS_URI: http://my-release-milvus.docs-agent.svc.cluster.local:19530
  MILVUS_USER: root
  PORT: "8000"
  PYTHONUNBUFFERED: "1"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-kubeflow-docs
  namespace: docs-agent
  labels:
    app: mcp-kubeflow-docs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-kubeflow-docs
  template:
    metadata:
      labels:
        app: mcp-kubeflow-docs
    spec:
      imagePullSecrets:
        - name: ghcrsecret
      containers:
        - name: mcp-server
          image: ghcr.io/OWNER/mcp-kubeflow-docs:latest
          ports:
            - name: mcp
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: mcp-server-config
          env:
            - name: MILVUS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mcp-server-secret
                  key: MILVUS_PASSWORD
            - name: CODE_COLLECTION_NAME
              value: code_rag
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-kubeflow-docs
  namespace: docs-agent
spec:
  selector:
    app: mcp-kubeflow-docs
  ports:
    - name: mcp
      port: 8000
      targetPort: 8000
      protocol: TCP
  type: ClusterIP
