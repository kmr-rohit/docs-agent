apiVersion: apps/v1
kind: Deployment
metadata:
  name: qwen-vllm
  namespace: docs-agent
  labels:
    app: qwen-vllm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qwen-vllm
  template:
    metadata:
      labels:
        app: qwen-vllm
    spec:
      nodeSelector:
        nvidia.com/gpu.present: "true"
      tolerations:
        - key: nvidia.com/gpu
          operator: Equal
          value: present
          effect: NoSchedule
      containers:
        - name: vllm
          image: index.docker.io/vllm/vllm-openai:v0.8.5
          args:
            - --model
            - Qwen/Qwen2.5-3B-Instruct
            - --served-model-name
            - qwen2.5-3b-instruct
            - --max-model-len
            - "8192"
            - --gpu-memory-utilization
            - "0.80"
            - --enable-auto-tool-choice
            - --tool-call-parser
            - hermes
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: huggingface-secret
                  key: token
                  optional: true
          resources:
            requests:
              cpu: "2"
              memory: "12Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "4"
              memory: "16Gi"
              nvidia.com/gpu: "1"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 20
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 180
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 10
---
apiVersion: v1
kind: Service
metadata:
  name: qwen-vllm
  namespace: docs-agent
spec:
  selector:
    app: qwen-vllm
  ports:
    - name: http
      port: 8000
      targetPort: 8000
  type: ClusterIP
