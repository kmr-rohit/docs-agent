apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: qwen
  namespace: docs-agent
spec:
  predictor:
    minReplicas: 1
    maxReplicas: 1
    nodeSelector:
      nvidia.com/gpu.present: "true"
    tolerations:
      - key: nvidia.com/gpu
        operator: Equal
        value: present
        effect: NoSchedule
    model:
      modelFormat:
        name: huggingface
        version: "1"
      runtime: llm-runtime
      args:
        - --model_name=qwen2.5-3b-instruct
        - --model_id=Qwen/Qwen2.5-3B-Instruct
        - --backend=vllm
        - --max-model-len=8192
        - --gpu-memory-utilization=0.80
        - --enable-auto-tool-choice
        - --tool-call-parser=hermes
      env:
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: huggingface-secret
              key: token
              optional: true
        - name: CUDA_VISIBLE_DEVICES
          value: "0"
      resources:
        requests:
          cpu: "2"
          memory: "12Gi"
          nvidia.com/gpu: "1"
        limits:
          cpu: "4"
          memory: "16Gi"
          nvidia.com/gpu: "1"
