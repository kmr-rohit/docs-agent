# Stable in-cluster OpenAI endpoint for Kagent (bypasses Knative ExternalName gateway).
# Selects the active KServe predictor pod by InferenceService label.
apiVersion: v1
kind: Service
metadata:
  name: qwen-llm
  namespace: docs-agent
  labels:
    app.kubernetes.io/component: qwen-llm
spec:
  selector:
    serving.kserve.io/inferenceservice: qwen
    component: predictor
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
